<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Pomaire — Panel de moderación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --clay-red:#b5502e;
    --clay-dark:#6b3520;
    --charcoal:#2b2622;
    --cream:#f1e6d3;
    --cream-2:#e7d7bb;
    --sage:#6e7a5c;
    --gold:#c98a34;
    --danger:#a13a2b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--charcoal);
    color:var(--cream);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:26px 20px;
    background:linear-gradient(160deg, var(--clay-dark) 0%, var(--clay-red) 60%, var(--clay-dark) 100%);
    border-bottom:3px solid var(--charcoal);
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:1.5rem;
    margin:0;
  }
  .tagline{
    font-family:'Space Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--gold);
    margin-top:6px;
  }
  main{max-width:820px;margin:0 auto;padding:24px 16px 80px;}
  .hidden{display:none !important;}

  /* Gate de acceso */
  .gate{
    max-width:360px;margin:60px auto;text-align:center;
  }
  .gate p{color:#a89685;font-size:0.88rem;margin-bottom:18px;}
  input[type=password], input[type=text]{
    width:100%;
    padding:11px 12px;
    border:1.5px solid #4a3c30;
    border-radius:8px;
    background:#3a3129;
    font-family:'Work Sans',sans-serif;
    font-size:0.95rem;
    color:var(--cream);
    margin-bottom:12px;
  }
  input:focus{outline:none;border-color:var(--gold);}
  .btn{
    padding:12px 18px;
    border-radius:8px;
    border:none;
    font-family:'Work Sans',sans-serif;
    font-weight:600;
    font-size:0.9rem;
    cursor:pointer;
  }
  .btn-primary{background:var(--clay-red);color:#fff;width:100%;}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-ghost{background:transparent;color:#c9b8a4;border:1.5px solid #4a3c30;}
  .error-msg{color:#e8a898;font-size:0.85rem;margin-top:8px;min-height:1.2em;}

  /* Panel */
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:10px;}
  .toolbar .btn{padding:9px 14px;font-size:0.82rem;}
  h2{
    font-family:'Fraunces',serif;font-size:1.15rem;
    margin:26px 0 12px;
    color:var(--gold);
  }
  .item{
    background:#3a3129;
    border-radius:8px;
    padding:14px 16px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }
  .item-body{flex:1;min-width:0;}
  .item-title{font-weight:600;font-size:0.95rem;margin-bottom:4px;word-break:break-word;}
  .item-meta{font-family:'Space Mono',monospace;font-size:0.7rem;color:#a89685;margin-bottom:4px;}
  .item-text{font-size:0.85rem;color:#c9b8a4;white-space:pre-wrap;word-break:break-word;}
  .empty{color:#8a7867;font-size:0.9rem;padding:20px 0;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--gold);color:var(--charcoal);
    padding:10px 18px;border-radius:20px;
    font-size:0.85rem;font-weight:600;
    z-index:60;box-shadow:0 4px 14px rgba(0,0,0,0.3);
    max-width:88vw;text-align:center;
  }
  .toast.error{background:var(--danger);color:#fff;}

  /* Formulario de crear emprendimiento */
  .create-form{
    background:#3a3129;
    border-radius:10px;
    padding:20px;
    margin-bottom:24px;
    border:1.5px solid #4a3c30;
  }
  .create-form h3{
    font-family:'Fraunces',serif;
    font-size:1.1rem;
    margin:0 0 14px;
    color:var(--gold);
  }
  .create-form label{
    display:block;
    font-size:0.72rem;
    font-family:'Space Mono',monospace;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:#a89685;
    margin:12px 0 5px;
  }
  .create-form select{
    width:100%;
    padding:10px 12px;
    border:1.5px solid #4a3c30;
    border-radius:8px;
    background:#2b2622;
    font-family:'Work Sans',sans-serif;
    font-size:0.9rem;
    color:var(--cream);
  }
  .create-form textarea{
    width:100%;
    padding:10px 12px;
    border:1.5px solid #4a3c30;
    border-radius:8px;
    background:#2b2622;
    font-family:'Work Sans',sans-serif;
    font-size:0.9rem;
    color:var(--cream);
    resize:vertical;
    min-height:60px;
  }
  .create-form select:focus, .create-form textarea:focus{
    outline:none;border-color:var(--gold);
  }
  .img-area{
    border:2px dashed #4a3c30;
    border-radius:8px;
    padding:20px;
    text-align:center;
    cursor:pointer;
    transition:border-color 0.15s;
    position:relative;
  }
  .img-area:hover{border-color:var(--gold);}
  .img-area.has-img{padding:0;border-style:solid;}
  .img-area img{
    width:100%;max-height:180px;object-fit:cover;
    border-radius:6px;display:block;
  }
  .img-area .img-hint{color:#8a7867;font-size:0.85rem;}
  .img-area .img-remove{
    position:absolute;top:6px;right:6px;
    width:26px;height:26px;border-radius:50%;
    background:var(--danger);color:#fff;border:none;
    font-size:0.8rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .form-row{display:flex;gap:10px;margin-top:16px;}
  .form-row .btn{flex:1;}
</style>
</head>
<body>

<header>
  <h1>Pomaire — Panel de moderación</h1>
  <div class="tagline">Acceso restringido</div>
</header>

<main>
  <div id="gate" class="gate">
    <p>Ingresa el token de administrador para gestionar publicaciones y mensajes del chat.</p>
    <input type="password" id="tokenInput" placeholder="Token de administrador" autocomplete="off">
    <button class="btn btn-primary" id="enterBtn">Entrar</button>
    <div class="error-msg" id="gateError"></div>
  </div>

  <div id="panel" class="hidden">
    <div class="toolbar">
      <button class="btn btn-ghost" id="refreshBtn">↻ Actualizar</button>
      <button class="btn btn-ghost" id="logoutBtn">Salir</button>
    </div>

    <h2>Emprendimientos (<span id="countNegocios">0</span>)</h2>

    <!-- Formulario crear emprendimiento -->
    <div class="create-form">
      <h3>➕ Publicar emprendimiento</h3>

      <label>Nombre del negocio</label>
      <input type="text" id="aNombre" placeholder="Ej: Alfarería Los Ríos" maxlength="60">

      <label>Categoría</label>
      <select id="aCategoria">
        <option value="Artesanía en greda">Artesanía en greda</option>
        <option value="Comida y cocinería">Comida y cocinería</option>
        <option value="Hospedaje">Hospedaje</option>
        <option value="Turismo y paseos">Turismo y paseos</option>
        <option value="Otro">Otro</option>
      </select>

      <label>Descripción</label>
      <textarea id="aDesc" rows="3" maxlength="300" placeholder="Cuenta qué ofrece este negocio…"></textarea>

      <label>Contacto (WhatsApp, teléfono, Instagram)</label>
      <input type="text" id="aContacto" placeholder="Ej: +56 9 1234 5678" maxlength="80">

      <label>Foto (opcional · máx 4 MB)</label>
      <div class="img-area" id="adminImgArea">
        <input type="file" id="adminImgFile" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none">
        <div class="img-hint" id="adminImgHint">📷 Clic para seleccionar imagen</div>
        <img class="hidden" id="adminImgPreview" alt="Preview">
        <button type="button" class="img-remove hidden" id="adminImgRemove">✕</button>
      </div>

      <label>Publicado por</label>
      <input type="text" id="aAutor" placeholder="Ej: Diego Rojas" maxlength="40">

      <div class="error-msg" id="adminFormError"></div>
      <div class="form-row">
        <button class="btn btn-primary" id="adminPublishBtn">Publicar emprendimiento</button>
      </div>
    </div>

    <div id="listNegocios"></div>

    <h2>Mensajes del chat (<span id="countMensajes">0</span>)</h2>
    <div id="listMensajes"></div>
  </div>
</main>

<script>
// El token se guarda solo en sessionStorage (se borra al cerrar la pestaña/navegador),
// nunca en localStorage ni en la URL, y se envía siempre por header, no por query string.
let adminToken = null;

function esc(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

function fmtTime(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
}

function showToast(msg, isError){
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

async function apiCall(url, method, body){
  const opts = { method, headers: { 'x-admin-token': adminToken } };
  if(body){ opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(url, opts);
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || ('Error ' + res.status));
  return data;
}

function getStoredToken(){
  try{ return sessionStorage.getItem('pomaire_admin_token'); }catch(e){ return null; }
}
function setStoredToken(t){
  try{ sessionStorage.setItem('pomaire_admin_token', t); }catch(e){}
}
function clearStoredToken(){
  try{ sessionStorage.removeItem('pomaire_admin_token'); }catch(e){}
}

async function tryEnter(token){
  adminToken = token;
  const errEl = document.getElementById('gateError');
  errEl.textContent = '';
  try{
    await loadData();
    setStoredToken(token);
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('panel').classList.remove('hidden');
  }catch(e){
    adminToken = null;
    errEl.textContent = e.message || 'Token inválido.';
  }
}

document.getElementById('enterBtn').addEventListener('click', ()=>{
  const val = document.getElementById('tokenInput').value.trim();
  if(!val){ document.getElementById('gateError').textContent = 'Ingresa un token.'; return; }
  tryEnter(val);
});
document.getElementById('tokenInput').addEventListener('keydown', (e)=>{
  if(e.key==='Enter') document.getElementById('enterBtn').click();
});
document.getElementById('logoutBtn').addEventListener('click', ()=>{
  adminToken = null;
  clearStoredToken();
  document.getElementById('panel').classList.add('hidden');
  document.getElementById('gate').classList.remove('hidden');
  document.getElementById('tokenInput').value = '';
});
document.getElementById('refreshBtn').addEventListener('click', loadData);

async function loadData(){
  const data = await apiCall('/api/moderar', 'GET');
  renderNegocios(data.negocios || []);
  renderMensajes(data.mensajes || []);
}

let allNegocios = [];

function renderNegocios(negocios){
  allNegocios = negocios;
  document.getElementById('countNegocios').textContent = negocios.length;
  const wrap = document.getElementById('listNegocios');
  if(!negocios.length){
    wrap.innerHTML = '<div class="empty">No hay emprendimientos publicados.</div>';
    return;
  }
  wrap.innerHTML = negocios.map(n => `
    <div class="item">
      <div class="item-body">
        ${n.imagen ? `<img src="${esc(n.imagen)}" alt="${esc(n.nombre)}" style="width:100%;max-height:120px;object-fit:cover;border-radius:6px;margin-bottom:8px;">` : ''}
        <div class="item-title">${esc(n.nombre)} <span style="color:#8a7867;font-weight:400;">— ${esc(n.categoria)}</span></div>
        <div class="item-meta">por ${esc(n.autor)} · ${esc(n.contacto)} · ${fmtTime(n.creado)}${n.editado ? ' · ✏️ editado' : ''}</div>
        <div class="item-text">${esc(n.descripcion)}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
        <button class="btn btn-ghost" data-edit-id="${esc(n.id)}" style="font-size:0.78rem;padding:8px 12px;">✏️ Editar</button>
        <button class="btn btn-danger" data-tipo="negocio" data-id="${esc(n.id)}">Borrar</button>
      </div>
    </div>
  `).join('');
}

function renderMensajes(mensajes){
  document.getElementById('countMensajes').textContent = mensajes.length;
  const wrap = document.getElementById('listMensajes');
  if(!mensajes.length){
    wrap.innerHTML = '<div class="empty">No hay mensajes en el chat.</div>';
    return;
  }
  wrap.innerHTML = mensajes.map(m => `
    <div class="item">
      <div class="item-body">
        <div class="item-title">${esc(m.autor)}${m.system ? ' <span style="color:#8a7867;font-weight:400;">(sistema)</span>' : ''}</div>
        <div class="item-meta">${fmtTime(m.ts)}</div>
        <div class="item-text">${esc(m.texto)}</div>
      </div>
      <button class="btn btn-danger" data-tipo="mensaje" data-id="${esc(m.id)}">Borrar</button>
    </div>
  `).join('');
}

document.getElementById('panel').addEventListener('click', async (e)=>{
  const editBtn = e.target.closest('button[data-edit-id]');
  if(editBtn){ openEditModal(editBtn.dataset.editId); return; }

  const btn = e.target.closest('button[data-tipo]');
  if(!btn) return;
  const tipo = btn.dataset.tipo;
  const id = btn.dataset.id;
  if(!confirm('¿Eliminar este ' + (tipo==='negocio' ? 'emprendimiento' : 'mensaje') + '?')) return;
  btn.disabled = true;
  try{
    await apiCall(`/api/moderar?tipo=${encodeURIComponent(tipo)}&id=${encodeURIComponent(id)}`, 'DELETE');
    showToast('Eliminado.');
    await loadData();
  }catch(err){
    showToast(err.message, true);
    btn.disabled = false;
  }
});

/* ──────── EDITAR ──────── */
let editingId = null, editImgUrl = '';

function openEditModal(id){
  const n = allNegocios.find(x=>x.id===id);
  if(!n) return;
  editingId = id;
  editImgUrl = n.imagen || '';
  document.getElementById('eNombre').value = n.nombre||'';
  document.getElementById('eCategoria').value = n.categoria||'Otro';
  document.getElementById('eDesc').value = n.descripcion||'';
  document.getElementById('eContacto').value = n.contacto||'';
  document.getElementById('eAutor').value = n.autor||'';
  document.getElementById('editErr').textContent = '';
  const prev = document.getElementById('eImgPrev');
  if(n.imagen){ prev.src=n.imagen; prev.style.display='block'; } else { prev.src=''; prev.style.display='none'; }
  document.getElementById('editModal').style.display = 'flex';
}

document.getElementById('editCloseBtn').addEventListener('click', ()=>{ document.getElementById('editModal').style.display='none'; });
document.getElementById('editModal').addEventListener('click', (e)=>{ if(e.target.id==='editModal') document.getElementById('editModal').style.display='none'; });

document.getElementById('eImgFile').addEventListener('change', async function(){
  const file = this.files[0];
  if(!file) return;
  if(file.size>4*1024*1024){ showToast('Máx 4MB',true); return; }
  try{
    const res = await fetch('/api/upload',{method:'POST',headers:{'Content-Type':file.type},body:file});
    const data = await res.json();
    if(!res.ok) throw new Error(data.error);
    editImgUrl = data.url;
    document.getElementById('eImgPrev').src = data.url;
    document.getElementById('eImgPrev').style.display = 'block';
    showToast('Imagen subida ✓');
  }catch(e){ showToast(e.message||'Error',true); }
});

document.getElementById('editSaveBtn').addEventListener('click', async ()=>{
  const nombre = document.getElementById('eNombre').value.trim();
  const categoria = document.getElementById('eCategoria').value;
  const descripcion = document.getElementById('eDesc').value.trim();
  const contacto = document.getElementById('eContacto').value.trim();
  const autor = document.getElementById('eAutor').value.trim();
  const errEl = document.getElementById('editErr');
  errEl.textContent='';
  if(!nombre||!descripcion||!contacto){ errEl.textContent='Completa nombre, descripción y contacto.'; return; }
  const btn = document.getElementById('editSaveBtn');
  btn.disabled=true; btn.textContent='Guardando…';
  try{
    await apiCall('/api/moderar','PUT',{id:editingId,nombre,categoria,descripcion,contacto,autor,imagen:editImgUrl});
    showToast('✏️ Actualizado');
    document.getElementById('editModal').style.display='none';
    await loadData();
  }catch(e){ errEl.textContent=e.message; }
  finally{ btn.disabled=false; btn.textContent='Guardar cambios'; }
});

/* ---------------- Init: reintenta con el token guardado en esta pestaña ---------------- */
(function init(){
  const stored = getStoredToken();
  if(stored){
    document.getElementById('tokenInput').value = stored;
    tryEnter(stored);
  }
})();

/* ──────────── CREAR EMPRENDIMIENTO DESDE ADMIN ──────────── */
let adminUploadedUrl = '';

const adminImgArea = document.getElementById('adminImgArea');
const adminImgFile = document.getElementById('adminImgFile');
const adminImgPreview = document.getElementById('adminImgPreview');
const adminImgHint = document.getElementById('adminImgHint');
const adminImgRemove = document.getElementById('adminImgRemove');

adminImgArea.addEventListener('click', (e)=>{
  if(e.target === adminImgRemove || e.target.closest('.img-remove')) return;
  adminImgFile.click();
});

adminImgFile.addEventListener('change', async ()=>{
  const file = adminImgFile.files[0];
  if(!file) return;

  if(file.size > 4*1024*1024){
    showToast('Imagen muy pesada. Máximo 4 MB.', true);
    adminImgFile.value = '';
    return;
  }
  if(!['image/jpeg','image/png','image/webp','image/gif'].includes(file.type)){
    showToast('Solo JPEG, PNG, WebP o GIF.', true);
    adminImgFile.value = '';
    return;
  }

  // Preview local
  const reader = new FileReader();
  reader.onload = (ev) => {
    adminImgPreview.src = ev.target.result;
    adminImgPreview.classList.remove('hidden');
    adminImgRemove.classList.remove('hidden');
    adminImgHint.classList.add('hidden');
    adminImgArea.classList.add('has-img');
  };
  reader.readAsDataURL(file);

  // Upload
  adminImgHint.textContent = '⏳ Subiendo…';
  try{
    const res = await fetch('/api/upload', {
      method:'POST',
      headers:{'Content-Type': file.type},
      body: file
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Error al subir');
    adminUploadedUrl = data.url;
    showToast('Imagen subida ✓');
  }catch(e){
    showToast(e.message || 'Error al subir imagen', true);
    resetAdminImg();
  }
});

adminImgRemove.addEventListener('click', (e)=>{
  e.stopPropagation();
  resetAdminImg();
});

function resetAdminImg(){
  adminUploadedUrl = '';
  adminImgFile.value = '';
  adminImgPreview.src = '';
  adminImgPreview.classList.add('hidden');
  adminImgRemove.classList.add('hidden');
  adminImgHint.classList.remove('hidden');
  adminImgHint.textContent = '📷 Clic para seleccionar imagen';
  adminImgArea.classList.remove('has-img');
}

document.getElementById('adminPublishBtn').addEventListener('click', async ()=>{
  const nombre = document.getElementById('aNombre').value.trim();
  const categoria = document.getElementById('aCategoria').value;
  const descripcion = document.getElementById('aDesc').value.trim();
  const contacto = document.getElementById('aContacto').value.trim();
  const autor = document.getElementById('aAutor').value.trim() || 'Admin';
  const imagen = adminUploadedUrl;
  const errEl = document.getElementById('adminFormError');

  errEl.textContent = '';
  if(!nombre || !descripcion || !contacto){
    errEl.textContent = 'Completa nombre, descripción y contacto.';
    return;
  }

  const btn = document.getElementById('adminPublishBtn');
  btn.disabled = true; btn.textContent = 'Publicando…';

  try{
    const res = await fetch('/api/negocios', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ nombre, categoria, descripcion, contacto, imagen, autor })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || 'Error al publicar');

    showToast('¡Emprendimiento publicado!');
    ['aNombre','aDesc','aContacto','aAutor'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('aCategoria').selectedIndex = 0;
    resetAdminImg();
    await loadData();
  }catch(e){
    errEl.textContent = e.message || 'Error al publicar.';
  }finally{
    btn.disabled = false; btn.textContent = 'Publicar emprendimiento';
  }
});
</script>

<!-- MODAL EDITAR -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(20,15,10,0.8);z-index:50;align-items:center;justify-content:center;padding:16px;">
  <div style="background:var(--cream);color:var(--charcoal);width:100%;max-width:500px;border-radius:12px;padding:22px 20px;max-height:90vh;overflow-y:auto;">
    <h2 style="font-family:'Fraunces',serif;font-size:1.2rem;margin:0 0 14px;color:var(--clay-dark);">✏️ Editar emprendimiento</h2>
    <label style="display:block;font-size:0.72rem;font-family:'Space Mono',monospace;text-transform:uppercase;color:#7a6a58;margin:10px 0 5px;">Nombre</label>
    <input type="text" id="eNombre" maxlength="60" style="width:100%;padding:10px;border:1.5px solid #d8c7ac;border-radius:8px;font-size:0.9rem;color:#2b2622;">
    <label style="display:block;font-size:0.72rem;font-family:'Space Mono',monospace;text-transform:uppercase;color:#7a6a58;margin:10px 0 5px;">Categoría</label>
    <select id="eCategoria" style="width:100%;padding:10px;border:1.5px solid #d8c7ac;border-radius:8px;font-size:0.9rem;color:#2b2622;">
      <option value="Artesanía en greda">Artesanía en greda</option>
      <option value="Comida y cocinería">Comida y cocinería</option>
      <option value="Hospedaje">Hospedaje</option>
      <option value="Turismo y paseos">Turismo y paseos</option>
      <option value="Otro">Otro</option>
    </select>
    <label style="display:block;font-size:0.72rem;font-family:'Space Mono',monospace;text-transform:uppercase;color:#7a6a58;margin:10px 0 5px;">Descripción</label>
    <textarea id="eDesc" rows="3" maxlength="300" style="width:100%;padding:10px;border:1.5px solid #d8c7ac;border-radius:8px;font-size:0.9rem;color:#2b2622;resize:vertical;"></textarea>
    <label style="display:block;font-size:0.72rem;font-family:'Space Mono',monospace;text-transform:uppercase;color:#7a6a58;margin:10px 0 5px;">Contacto</label>
    <input type="text" id="eContacto" maxlength="80" style="width:100%;padding:10px;border:1.5px solid #d8c7ac;border-radius:8px;font-size:0.9rem;color:#2b2622;">
    <label style="display:block;font-size:0.72rem;font-family:'Space Mono',monospace;text-transform:uppercase;color:#7a6a58;margin:10px 0 5px;">Foto (subir nueva)</label>
    <input type="file" id="eImgFile" accept="image/jpeg,image/png,image/webp,image/gif" style="margin-bottom:8px;">
    <img id="eImgPrev" style="display:none;width:100%;max-height:140px;object-fit:cover;border-radius:6px;margin-bottom:8px;" alt="Preview">
    <label style="display:block;font-size:0.72rem;font-family:'Space Mono',monospace;text-transform:uppercase;color:#7a6a58;margin:10px 0 5px;">Autor</label>
    <input type="text" id="eAutor" maxlength="40" style="width:100%;padding:10px;border:1.5px solid #d8c7ac;border-radius:8px;font-size:0.9rem;color:#2b2622;">
    <div id="editErr" style="color:#a13a2b;font-size:0.8rem;margin-top:10px;"></div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-ghost" id="editCloseBtn" style="flex:1;padding:12px;">Cancelar</button>
      <button class="btn btn-primary" id="editSaveBtn" style="flex:1;padding:12px;">Guardar cambios</button>
    </div>
  </div>
</div>

</body>
</html>
